name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Create Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `Slack Broadcaster ${context.ref.replace('refs/tags/', '')}`,
              body: `## Slack Broadcaster ${context.ref.replace('refs/tags/', '')}\n\nDownload the file for your platform below.\n\n### macOS\nDownload the \`.dmg\` file, open it, and drag Slack Broadcaster to your Applications folder.\n\n**Important:** After opening the app for the first time, if you see a Gatekeeper warning, run this in Terminal:\n\`\`\`\nxattr -cr /Applications/Slack\\\\ Broadcaster.app\n\`\`\`\nThen open the app again.\n\n### Windows\nDownload and run the \`.msi\` installer.\n\n### Linux\nDownload the \`.deb\` or \`.AppImage\` file.`,
              draft: false,
              prerelease: false,
            });
            return data.upload_url;

  build-macos:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            label: Apple Silicon
          - target: x86_64-apple-darwin
            label: Intel
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (${{ matrix.label }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Slack Broadcaster ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Slack Broadcaster ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Slack Broadcaster ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false

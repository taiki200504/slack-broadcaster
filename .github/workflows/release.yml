name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Slack Broadcaster ${{ github.ref_name }}" \
            --notes "$(cat <<'NOTES'
          ## Install

          ### macOS (recommended)
          Open Terminal and run:
          ```
          curl -fsSL https://raw.githubusercontent.com/taiki200504/slack-broadcaster/main/install.sh | bash
          ```
          This downloads, installs, and opens the app automatically.

          ### Windows
          Download the `.msi` file below and run the installer.

          ### Linux
          Download the `.AppImage` file below.

          ---

          <details><summary>macOS manual install</summary>

          1. Download the `.dmg` file below
          2. Open the DMG and drag the app to Applications
          3. Open Terminal and run: `xattr -cr /Applications/Slack\ Broadcaster.app`
          4. Open the app

          </details>
          NOTES
          )"

  build-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (universal)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Slack Broadcaster ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      - name: Remove updater artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for asset in $(gh release view "${{ github.ref_name }}" --json assets -q '.assets[].name' | grep -E '\.(tar\.gz|sig)$'); do
            gh release delete-asset "${{ github.ref_name }}" "$asset" --yes
          done

  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Slack Broadcaster ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false

      - name: Remove updater artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          for asset in $(gh release view "${{ github.ref_name }}" --json assets -q '.assets[].name' | grep -E '\.(nsis\.zip|sig)$'); do
            gh release delete-asset "${{ github.ref_name }}" "$asset" --yes
          done

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Slack Broadcaster ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false

      - name: Keep only AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for asset in $(gh release view "${{ github.ref_name }}" --json assets -q '.assets[].name' | grep -E '\.(deb|rpm|tar\.gz|sig)$'); do
            gh release delete-asset "${{ github.ref_name }}" "$asset" --yes
          done
